name: "Workflow 2: Sync & Version"

# MVP: manual trigger, processes all sources
# GSOC: schedule: cron: '0 2 * * *'  + batch rotation from batch_state.json
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Workflow 1: Source Discovery"]
    types:
      - completed

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get
        working-directory: pipeline

      - name: Sync all sources
        run: |
          [ -f registry/hashes.json ] || echo '{}' > registry/hashes.json

          # MVP: process all enabled sources
          # GSOC: read current batch from batch_state.json, process only that batch
          jq -r '.sources[] | select(.enabled==true) | .id' registry/registry.json | while read -r ID; do
            echo "--- $ID ---"

            SPEC_URL=$(jq -r --arg id "$ID" '.sources[] | select(.id==$id) | .specUrl' registry/registry.json)
            CATEGORY=$(jq -r --arg id "$ID" '.sources[] | select(.id==$id) | .category' registry/registry.json)

            HTTP=$(curl -sS -o /tmp/spec_raw -w "%{http_code}" "$SPEC_URL")
            [ "$HTTP" != "200" ] && echo "HTTP $HTTP — skip" && continue

            NEW_HASH=$(sha256sum /tmp/spec_raw | awk '{print $1}')
            OLD_HASH=$(jq -r --arg id "$ID" '.[$id].hash // ""' registry/hashes.json)

            if [ "$OLD_HASH" = "$NEW_HASH" ]; then
              echo "Unchanged — skip"; continue
            fi

            dart run pipeline/bin/pipeline.dart \
              --source-id "$ID" \
              --spec-file /tmp/spec_raw \
              --category "$CATEGORY" \
              --sources-file registry/registry.json \
              --output-dir api_templates || { echo "Pipeline failed — skip"; continue; }

            jq --arg id "$ID" --arg h "$NEW_HASH" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '.[$id] = {hash: $h, lastSynced: $ts}' \
              registry/hashes.json > /tmp/h.json && mv /tmp/h.json registry/hashes.json
          done

      - name: Commit templates output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api_templates/ registry/hashes.json
          if git diff --cached --quiet; then
            echo "No template changes."
          else
            git commit -m "chore(sync): update API templates and hashes [$(date -u +%Y-%m-%d)]" && git push
          fi

      - name: Generate current.json pointer (post-push SHA)
        run: |
          # Read the SHA of the commit that was just pushed (or HEAD if nothing changed)
          NEW_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg sha "$NEW_SHA" \
            --arg ts "$TIMESTAMP" \
            '{sha: $sha, updatedAt: $ts, message: "Pointer to latest immutable CDN URLs"}' \
            > api_templates/current.json
          echo "current.json now points to: $NEW_SHA"
          cat api_templates/current.json
          git add api_templates/current.json
          git diff --cached --quiet \
            && echo "current.json unchanged." \
            || git commit -m "chore(pointer): update current.json to $NEW_SHA" && git push

      - name: Purge jsDelivr Cache
        run: |
          # Purge the pointer file (only mutable file)
          curl -s https://purge.jsdelivr.net/gh/${{ github.repository }}/api_templates/current.json
          echo "Purged: api_templates/current.json"
          
          # Purge the global index (secondary option)
          curl -s https://purge.jsdelivr.net/gh/${{ github.repository }}/api_templates/global_index.json
          echo "Purged: api_templates/global_index.json"
